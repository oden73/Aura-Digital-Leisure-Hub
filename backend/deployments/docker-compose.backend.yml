version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aura}
      POSTGRES_USER: ${POSTGRES_USER:-aura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aura}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v1/heartbeat >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  core-go:
    image: golang:1.22
    working_dir: /workspace/backend/core-go
    command: go run ./cmd/api
    ports:
      - "8080:8080"
    volumes:
      - ../../:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://aura:aura@postgres:5432/aura?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy

  ai-engine-python:
    image: python:3.12-slim
    working_dir: /workspace/backend/ai-engine-python
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8090"
    ports:
      - "8090:8090"
    volumes:
      - ../../:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://aura:aura@postgres:5432/aura?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
