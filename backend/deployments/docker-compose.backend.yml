# Local-development stack for the Aura backend.
#
# Brings up Postgres + ChromaDB + Go core + Python AI engine. The
# `migrate` service applies SQL migrations once at startup and exits;
# the API is gated on it via depends_on/condition: service_completed_successfully.
#
# Usage:
#   cd backend
#   cp .env.example .env
#   docker compose -f deployments/docker-compose.backend.yml up --build

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aura}
      POSTGRES_USER: ${POSTGRES_USER:-aura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aura}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v1/heartbeat >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  # One-shot migration runner. Compose treats this as a "task" service:
  # it builds the same image as core-go (the migrate binary lives
  # inside it), runs `migrate up`, and exits. The api/ai-engine wait
  # for it to complete successfully via depends_on.
  migrate:
    build:
      context: ..
      dockerfile: core-go/Dockerfile
    image: aura-core-go:dev
    entrypoint: ["migrate", "--dir=/app/migrations", "up"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://aura:aura@postgres:5432/aura?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  core-go:
    build:
      context: ..
      dockerfile: core-go/Dockerfile
    image: aura-core-go:dev
    ports:
      - "${CORE_GO_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://aura:aura@postgres:5432/aura?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      AI_ENGINE_URL: ${AI_ENGINE_URL:-http://ai-engine:8090}
      AI_ENGINE_TIMEOUT_MS: ${AI_ENGINE_TIMEOUT_MS:-2000}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-40}
      SHUTDOWN_TIMEOUT_SECONDS: ${SHUTDOWN_TIMEOUT_SECONDS:-15}
      SIMILARITY_CACHE_TTL_SECONDS: ${SIMILARITY_CACHE_TTL_SECONDS:-1800}
      USER_SIMILARITY_CACHE_MAX: ${USER_SIMILARITY_CACHE_MAX:-100000}
      ITEM_SIMILARITY_CACHE_MAX: ${ITEM_SIMILARITY_CACHE_MAX:-50000}
    depends_on:
      migrate:
        condition: service_completed_successfully
      ai-engine:
        condition: service_started

  ai-engine:
    build:
      context: ../ai-engine-python
      dockerfile: Dockerfile
    image: aura-ai-engine:dev
    ports:
      - "${AI_ENGINE_PORT:-8090}:8090"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://aura:aura@postgres:5432/aura?sslmode=disable}
      CHROMA_URL: ${CHROMA_URL:-http://chroma:8000}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-aura-items}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      AI_ENGINE_HOST: 0.0.0.0
      AI_ENGINE_PORT: "8090"
      HF_HOME: /data/hf-cache
    volumes:
      - hf_cache:/data/hf-cache
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
  hf_cache:
