# Production / VPS deploy — full Aura stack.
#
# Usage:
#   cp backend/.env.example .env   # then fill in real values
#   docker compose up --build -d
#
# The Go core API is exposed on CORE_GO_PORT (default 8080).
# Put Nginx / Caddy in front to terminate TLS and set CORS_ALLOWED_ORIGINS
# to your Vercel/Pages frontend URL.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aura}
      POSTGRES_USER: ${POSTGRES_USER:-aura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}   # override in .env on VPS
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    restart: unless-stopped
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost', 8000), 2); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  migrate:
    build:
      context: backend
      dockerfile: core-go/Dockerfile
    image: aura-core-go:latest
    entrypoint: ["migrate", "--dir=/app/migrations", "up"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://aura:aura@postgres:5432/aura?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  core-go:
    build:
      context: backend
      dockerfile: core-go/Dockerfile
    image: aura-core-go:latest
    restart: unless-stopped
    ports:
      - "${CORE_GO_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://aura:aura@postgres:5432/aura?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}   # must be set in .env on VPS
      AI_ENGINE_URL: ${AI_ENGINE_URL:-http://ai-engine:8090}
      AI_ENGINE_TIMEOUT_MS: ${AI_ENGINE_TIMEOUT_MS:-2000}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-40}
      SHUTDOWN_TIMEOUT_SECONDS: ${SHUTDOWN_TIMEOUT_SECONDS:-15}
      SIMILARITY_CACHE_TTL_SECONDS: ${SIMILARITY_CACHE_TTL_SECONDS:-1800}
      USER_SIMILARITY_CACHE_MAX: ${USER_SIMILARITY_CACHE_MAX:-100000}
      ITEM_SIMILARITY_CACHE_MAX: ${ITEM_SIMILARITY_CACHE_MAX:-50000}
      STEAM_API_KEY: ${STEAM_API_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully
      ai-engine:
        condition: service_started

  ai-engine:
    build:
      context: backend/ai-engine-python
      dockerfile: Dockerfile
    image: aura-ai-engine:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://aura:aura@postgres:5432/aura?sslmode=disable}
      CHROMA_URL: ${CHROMA_URL:-http://chroma:8000}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-aura-items}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      AI_ENGINE_HOST: 0.0.0.0
      AI_ENGINE_PORT: "8090"
      HF_HOME: /data/hf-cache
    volumes:
      - hf_cache:/data/hf-cache
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started

volumes:
  postgres_data:
  chroma_data:
  hf_cache:
